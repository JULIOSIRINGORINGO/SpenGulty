<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SpendGuilty</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    
    <style>
        /* CSS INI YANG KURANG: MEMBUAT NAVIGASI JADI BIRU SAAT AKTIF */
        .nav-link-custom {
            color: #B0B0B0; /* Warna Abu-abu kalau tidak aktif */
            text-decoration: none;
            font-size: 1.5rem;
            transition: 0.3s;
        }

        /* Kalau ada class 'active', paksa jadi Biru Aplikasi */
        .nav-link-custom.active {
            color: #6CB4EE !important; 
        }

        .nav-link-custom:hover {
            color: #6CB4EE;
        }
    </style>
</head>
<body>

    {% block content %}{% endblock %}

<div class="bottom-nav-wrapper">
    <div class="bottom-nav-bar">
        <a href="{{ url_for('home') }}" class="nav-link-custom {% if page == 'home' %}active{% endif %}">
            <i class="fas fa-list-ul"></i>
        </a>
        
        <a href="{{ url_for('dashboard') }}" class="nav-link-custom {% if page == 'dashboard' %}active{% endif %}">
            <i class="fas fa-expand"></i> 
        </a>
        
        <a href="{{ url_for('profile') }}" class="nav-link-custom {% if page == 'profile' %}active{% endif %}">
            <i class="fas fa-user"></i>
        </a>
    </div>
</div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        // Script ini otomatis nyalakan ikon berdasarkan alamat website saat ini
        var currentPath = window.location.pathname;
        var navLinks = document.querySelectorAll('.nav-link-custom');
        navLinks.forEach(function(link) {
            // Jika link navigasi sama dengan alamat sekarang, tambahkan kelas active
            if (link.getAttribute('href') === currentPath) {
                link.classList.add('active');
            }
        });
    </script>
</body>
</html>
