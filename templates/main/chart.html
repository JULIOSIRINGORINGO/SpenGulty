{% extends "base.html" %}
{% block content %}

<style>
    /* 1. Kunci scroll utama agar hanya bagian kategori yang bisa di-scroll */
    body, html {
        margin: 0;
        height: 100%;
        overflow: hidden; /* Mencegah seluruh halaman ikut bergeser */
        background-color: #F8F9FA;
    }

    /* HEADER BIRU */
    .chart-header-bg {
        background-color: #6CB4EE;
        height: 320px; 
        border-bottom-left-radius: 40px;
        border-bottom-right-radius: 40px;
        padding-top: 30px;
        padding-left: 20px;
        padding-right: 20px;
        position: relative;
        z-index: 10;
    }

    /* CONTAINER GRAFIK */
    .chart-container-wrapper {
        margin-top: -160px; 
        position: relative;
        z-index: 20;
        padding: 0 20px;
    }

    .chart-card {
        background: white;
        border-radius: 30px;
        padding: 20px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        text-align: center;
        min-height: 280px; 
    }
    
    .canvas-holder {
        height: 220px !important; 
        width: 100%;
        position: relative;
        margin: 0 auto;
    }

    .month-nav-text {
        color: white !important;
        font-weight: 500;
        font-size: 1.3rem;
    }
    
    /* 2. BOX KATEGORI - Tinggi Tetap agar Scroll Internal Berfungsi */
    .category-box-fixed {
        margin: 20px;
        background: white;
        border-radius: 25px;
        padding: 20px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        /* Menghitung sisa layar agar pas di berbagai HP */
        height: calc(100vh - 460px); 
        display: flex;
        flex-direction: column;
        margin-bottom: 20px;
    }

    /* BAGIAN LIST YANG BISA SCROLL */
    .inner-list-scroll {
        flex: 1; /* Mengambil sisa ruang di dalam box */
        overflow-y: auto;
        -webkit-overflow-scrolling: touch; /* Scroll mulus di iOS */
    }
    
    .inner-list-scroll::-webkit-scrollbar {
        display: none; /* Sembunyikan scrollbar agar rapi */
    }

    /* CUSTOM SELECT SORTING */
    .select-custom-wrapper {
        position: relative;
        background-color: #f8f9fa;
        border-radius: 50px;
    }
    .select-custom {
        appearance: none;
        background: transparent;
        border: none;
        padding: 8px 35px 8px 15px;
        font-weight: bold;
        color: #333;
        font-size: 0.8rem;
        cursor: pointer;
    }
    .select-icon {
        position: absolute;
        right: 12px;
        top: 50%;
        transform: translateY(-50%);
        pointer-events: none;
    }
</style>

<div class="chart-header-bg">
    <div class="d-flex justify-content-between align-items-center">
        <span class="month-nav-text">{{ display_month }}</span>
        
        <div class="position-relative">
            <button type="button" class="btn shadow-sm rounded-pill px-3 fw-bold d-flex align-items-center" 
                    style="background: rgba(255,255,255,0.2); color: white; border: 1px solid rgba(255,255,255,0.3); font-size: 0.8rem; height: 35px;" 
                    onclick="triggerMonthJump()">
                <span class="me-2">Pilih Bulan</span> 
                <i class="fas fa-calendar-alt"></i>
            </button>
            <input type="month" id="jump-month" 
                   style="position: absolute; top: 0; right: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer;" 
                   onchange="jumpToMonth(this)" value="{{ current_month }}">
        </div>
    </div>
    <div class="text-center mt-4 text-white">
        <small style="opacity: 0.8;">Analisis Pengeluaran</small>
    </div>
</div>

<div class="chart-container-wrapper">
    <div class="chart-card">
        <div class="canvas-holder">
            <canvas id="chartSpendGuilty"></canvas>
        </div>
    </div>
</div>

<div id="data-store" 
     data-labels='{{ data_list|map(attribute="nama")|list|tojson }}' 
     data-vals='{{ data_list|map(attribute="persen")|list|tojson }}' 
     style="display:none;"></div>

<div class="category-box-fixed">
    <div class="d-flex justify-content-between align-items-center border-bottom pb-2 mb-2">
        <span class="fw-bold text-dark small">Rincian Kategori</span>
        
        <div class="select-custom-wrapper">
            <select id="sort-select" onchange="changeSort(this)" class="select-custom">
                <option value="tertinggi" {% if sort_val == 'tertinggi' %}selected{% endif %}>Tertinggi</option>
                <option value="terendah" {% if sort_val == 'terendah' %}selected{% endif %}>Terendah</option>
            </select>
            <i class="fas fa-sort select-icon text-muted small"></i>
        </div>
    </div>
    
    <div class="inner-list-scroll">
        {% if data_list %}
            {% for item in data_list %}
            <div class="d-flex justify-content-between align-items-center py-3 border-bottom-light">
                <div class="d-flex align-items-center">
                    <div style="width: 10px; height: 10px; border-radius: 50%; background-color:hsl({{ (loop.index0 * 360) / data_list|length }}, 75%, 55%); margin-right: 15px;"></div>
                    <span class="fw-bold text-dark text-uppercase small">{{ item.nama }}</span>
                </div>
                <span class="fw-bold text-dark small">{{ item.persen }}%</span>
            </div>
            {% endfor %}
            <div style="height: 30px;"></div>
        {% else %}
            <div class="text-center py-5">
                <p class="text-muted small">Belum ada pengeluaran.</p>
            </div>
        {% endif %}
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
function triggerMonthJump() { 
    const input = document.getElementById('jump-month');
    try { input.showPicker(); } catch (e) { input.click(); }
}

function jumpToMonth(el) {
    if(!el.value) return; 
    const currentSort = document.getElementById('sort-select').value;
    window.location.href = `{{ url_for('chart') }}?month=${el.value}&sort=${currentSort}`;
}

function changeSort(el) {
    const url = new URL(window.location.href);
    url.searchParams.set('sort', el.value);
    const currentMonth = document.getElementById('jump-month').value;
    url.searchParams.set('month', currentMonth);
    window.location.href = url.toString();
}

document.addEventListener('DOMContentLoaded', function() {
    const store = document.getElementById('data-store');
    if (!store.dataset.labels || store.dataset.labels == '[]') return;

    const labels = JSON.parse(store.dataset.labels);
    const values = JSON.parse(store.dataset.vals);
    const ctx = document.getElementById('chartSpendGuilty').getContext('2d');

    Chart.defaults.elements.arc.borderWidth = 0;

    new Chart(ctx, {
        type: 'pie',
        data: {
            labels: labels,
            datasets: [{
                data: values,
                backgroundColor: labels.map((_, i) => `hsl(${(i * 360) / labels.length}, 70%, 60%)`), 
                hoverOffset: 10
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { display: false },
                tooltip: {
                    enabled: true,
                    backgroundColor: '#000000',     
                    padding: 12,
                    displayColors: false,           
                    bodyFont: { size: 14, weight: 'bold', family: 'Arial, sans-serif' },
                    callbacks: {
                        // FIX TULISAN DOUBLE: Kosongkan bagian title
                        title: function() { return ''; },
                        label: function(context) {
                            return context.label.toUpperCase() + ': ' + context.raw + '%';
                        }
                    }
                }
            }
        }
    });
});
</script>
{% endblock %}
